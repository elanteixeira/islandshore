<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISLANDSHORE.COM</title>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<style>
body{margin:0;font-family:Arial;background:#0b0b18;color:#fff}
header{padding:20px;text-align:center;background:linear-gradient(135deg,#7c3aed,#1e88e5)}
h1{margin:0}
.container{max-width:800px;margin:auto;padding:20px}
.card{background:#1a1a2e;padding:15px;border-radius:10px;margin-bottom:15px}
input,textarea{width:100%;padding:10px;margin-top:5px;border:none;border-radius:6px;background:#111;color:#fff}
button{padding:10px 15px;margin-top:10px;border:none;border-radius:6px;background:#7c3aed;color:#fff;cursor:pointer}
.comment{font-size:0.85rem;margin-top:5px;border-top:1px solid #333;padding-top:5px}
</style>
</head>
<body>

<header>
  <h1>🌊 ISLANDSHORE.COM</h1>
  <p>Bem-vindo! Poste, comente e interaja livremente 🚀</p>
</header>

<div class="container">

<!-- LOGIN -->
<div class="card">
  <h3>Login</h3>
  <input id="email" placeholder="Email">
  <input id="senha" type="password" placeholder="Senha">
  <button onclick="login()">Entrar / Criar conta</button>
</div>

<!-- POST -->
<div class="card">
  <h3>Nova publicação</h3>
  <textarea id="postText" placeholder="Escreva algo..."></textarea>
  <input type="file" id="img">
  <button onclick="postar()">Publicar</button>
</div>

<!-- POSTS -->
<div id="posts"></div>

</div>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyBXqqxr_1nKH1Z4HpxXiURtOJj0dcIiU5o",
  authDomain: "islandh-fd1bd.firebaseapp.com",
  projectId: "islandh-fd1bd"
});

var db = firebase.firestore();
var auth = firebase.auth();
var userAtual = null;

// LOGIN
function login(){
  var e = email.value;
  var s = senha.value;

  auth.signInWithEmailAndPassword(e,s)
  .then(()=>alert("Logado"))
  .catch(()=>{
    auth.createUserWithEmailAndPassword(e,s)
    .then(()=>alert("Conta criada"))
  });
}

auth.onAuthStateChanged(u=>userAtual=u);

// EMOJI
function emoji(uid){
  var e=['😀','😎','🔥','🚀','👨‍💻','⚙️'];
  return e[uid.charCodeAt(0)%e.length];
}

// BLOQUEIO
function bloqueado(t){
  var b=['merda','porra','fdp'];
  return b.some(x=>t.toLowerCase().includes(x));
}

// POSTAR
async function postar(){
  var t = postText.value;
  var file = img.files[0];

  if(!t && !file) return;

  if(bloqueado(t)){alert("Texto bloqueado");return;}

  var url="";
  if(file){
    var fd=new FormData();
    fd.append("file",file);
    fd.append("upload_preset","elan_upload");

    var r=await fetch("https://api.cloudinary.com/v1_1/durb9y5pm/upload",{method:"POST",body:fd});
    var d=await r.json();
    url=d.secure_url;
  }

  db.collection("posts").add({
    texto:t,
    img:url,
    user:userAtual?userAtual.email:"anon",
    uid:userAtual?userAtual.uid:"anon",
    time:Date.now()
  });

  postText.value="";
  img.value="";
}

// CARREGAR POSTS
db.collection("posts").onSnapshot(snap=>{
  posts.innerHTML="";
  snap.forEach(doc=>{
    var p=doc.data();

    posts.innerHTML+=`
    <div class="card">
      <strong>${emoji(p.uid)} ${p.user}</strong><br>
      <small>${new Date(p.time).toLocaleString()}</small>
      <p>${p.texto||""}</p>
      ${p.img?`<img src="${p.img}" style="width:100%">`:""}
      
      <input placeholder="Comentar..." onkeydown="if(event.key==='Enter')coment('${doc.id}',this)">
      <div id="c_${doc.id}"></div>
    </div>
    `;

    carregarComentarios(doc.id);
  });
});

// COMENTAR
function coment(id,input){
  var t=input.value;
  if(!t)return;

  if(!userAtual){alert("Faça login");return;}
  if(bloqueado(t)){alert("Texto bloqueado");return;}

  db.collection("posts").doc(id).collection("c").add({
    t:t,
    u:userAtual.email,
    uid:userAtual.uid,
    time:Date.now()
  });

  input.value="";
}

// CARREGAR COMENTÁRIOS
function carregarComentarios(id){
  db.collection("posts").doc(id).collection("c").orderBy("time")
  .onSnapshot(s=>{
    var el=document.getElementById("c_"+id);
    el.innerHTML="";
    s.forEach(d=>{
      var c=d.data();
      el.innerHTML+=`
      <div class="comment">
        ${emoji(c.uid)} ${c.u}<br>
        ${c.t}<br>
        <small>${new Date(c.time).toLocaleString()}</small>
      </div>`;
    });
  });
}
</script>

</body>
</html>
